name: Bug
description: Reportar um bug
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: service
    attributes:
      label: Serviço afetado
      options: [auth-service, transaction-service, budget-service, chat-service, notification-service, report-service, frontend, infra]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Descrição
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Como reproduzir
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
