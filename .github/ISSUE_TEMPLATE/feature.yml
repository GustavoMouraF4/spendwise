name: Feature
description: Nova funcionalidade
title: "[FEATURE] "
labels: ["feature", "triage"]
body:
  - type: dropdown
    id: service
    attributes:
      label: Serviço
      options: [auth-service, transaction-service, budget-service, chat-service, notification-service, report-service, frontend, infra]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Descrição
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Critérios de aceitação
      placeholder: "- [ ] Critério 1\n- [ ] Critério 2"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options: [Alta, Média, Baixa]
    validations:
      required: true
